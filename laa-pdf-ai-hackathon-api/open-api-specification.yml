openapi: "3.0.0"
info:
  version: 1.0.0
  title: CW1 Form Processing API
paths:
  /api/v1/image:
    get:
      tags:
        - image
      summary: List all image submissions
      operationId: listImages
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageSummary'
        '500':
          description: 'Internal server error'
    post:
      tags:
        - image
      summary: Upload an image for processing
      operationId: uploadImage
      requestBody:
        description: Multipart form containing an image file and associated metadata
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImageRequestBody'
      responses:
        '201':
          description: 'Created'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          description: 'Bad request'
        '401':
          description: 'Unauthorized'
        '403':
          description: 'Forbidden'
        '422':
          description: 'Unprocessable content — not a valid CW1 form'
        '500':
          description: 'Internal server error'

  /api/v1/image/{id}:
    get:
      tags:
        - image
      summary: Get image submission by ID
      operationId: getImageById
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the image submission to retrieve
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '404':
          description: 'Not found'
        '500':
          description: 'Internal server error'

components:
  schemas:
    ImageSummary:
      required:
        - id
        - email
        - submittedAt
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the submission
        email:
          type: string
          description: Email address of the submitter
        submittedAt:
          type: string
          format: date-time
          description: Timestamp when the submission was received

    ImageRequestBody:
      required:
        - image
        - email
      properties:
        image:
          type: string
          format: binary
          description: The image file to be processed
        email:
          type: string
          format: email
          description: Email address of the submitter

    ImageResponse:
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the created image submission
        extractedData:
          type: object
          description: Structured JSON data extracted from the image by the AI provider
          additionalProperties: true
        confidence:
          type: object
          description: Per-field confidence scores (0.0–1.0) as reported by the AI provider
          additionalProperties: true
