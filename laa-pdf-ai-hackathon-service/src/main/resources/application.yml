server:
  port: 8081 # change to desired port number
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1

spring:
  application:
    name: laa-spring-boot-microservice
    version: @version@

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # example database
  datasource:
    url: jdbc:h2:mem:itemsDb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  #do not auto create db schema, use Flyway migrations
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: never

  flyway:
    enabled: true

management:
  server:
    port: 8181 # change to desired port number
  # specify actuator endpoints to enable
  endpoints:
    web:
      exposure:
        include: health

gemini:
  api-key: ${GEMINI_API_KEY:} # set GEMINI_API_KEY environment variable

sentry:
  dsn: # configure dsn url here
  environment: # configure environment name here

# ECS structured logging
logging:
  level:
    root: ${ROOT_LOGGING_LEVEL:info}
    org.springframework: ${SPRING_LOGGING_LEVEL:info}
    uk.gov.justice.laa.springboot.microservice: ${APP_LOGGING_LEVEL:info}
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name:default}
        version: ${spring.application.version:default}
        environment: ${spring.profiles.active:default}
        node_name: ${HOSTNAME:unknown}

---
# local profile configuration
spring:
  config:
    activate:
      on-profile: local

logging:
  level:
    root: ${ROOT_LOGGING_LEVEL:info}
    org.springframework: ${SPRING_LOGGING_LEVEL:info}
    uk.gov.justice.laa.springboot.microservice: ${APP_LOGGING_LEVEL:info}
  structured:
    format:
      console: # disables structured logging locally
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr{faint} %clr([%15.15t]){faint} %clr([%X{traceId:-},%X{spanId:-}]){yellow} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"
